version: '3.8'

services:
  db:
    image: postgres:15
    container_name: deribit-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: deribit_prices
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d deribit_prices"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - deribit-network

  redis:
    image: redis:7
    container_name: deribit-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - deribit-network

  app:
    build: .
    container_name: deribit-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/deribit_prices
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "
        python -c 'from app.core.database import Base, engine; Base.metadata.create_all(bind=engine)' &&
        celery -A app.core.celery_app worker --loglevel=info --detach &&
        celery -A app.core.celery_app beat --loglevel=info --detach &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    restart: unless-stopped
    networks:
      - deribit-network

volumes:
  postgres_data:

networks:
  deribit-network:
    driver: bridge